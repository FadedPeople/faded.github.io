<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live2D Test</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
</style>

<!-- PIXI 6 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/browser/pixi.min.js"></script>

<!-- Cubism 4 Core -->
<script src="https://unpkg.com/live2d-cubismcore@4/dist/live2dcubismcore.min.js"></script>

<!-- Pixi Live2D Display Cubism 4 build -->
<script src="https://unpkg.com/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

</head>

<body>

<script>
const app = new PIXI.Application({
    resizeTo: window,
    backgroundColor: 0x000000
});
document.body.appendChild(app.view);

(async () => {

    try {

        const model = await PIXI.live2d.Live2DModel.from(
            "https://unpkg.com/pixi-live2d-display@latest/assets/shizuku/shizuku.model.json"
        );

        model.scale.set(0.25);
        model.x = window.innerWidth / 2;
        model.y = window.innerHeight * 0.95;
        model.anchor.set(0.5,1);

        app.stage.addChild(model);

        console.log("ENGINE WORKING");

    } catch (err) {
        console.error(err);
        alert("Engine failed.");
    }

})();
</script>

</body>
</html>
